<!DOCTYPE html>
<html lang="en">

<head>
    <title>Scanner | Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/style.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        #reader {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
        }

        #start-btn {
            width: 100%;
            justify-content: center;
            padding: 1rem;
            font-size: 1.1rem;
            background: var(--accent-mint);
            color: #000;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout">
        <nav class="sidebar">
            <a href="/" class="sidebar-icon">🏠</a>
            <a href="/student-dashboard" class="sidebar-icon active">🎓</a>
            <a href="/profile" class="sidebar-icon">👤</a>
            <a href="/logout" class="sidebar-icon" style="margin-top: auto;">🚪</a>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="cursive-header">QR Scanner</h1>
                <a href="/student-dashboard" class="btn-premium"
                    style="background: rgba(255,255,255,0.05); color: white;">Cancel</a>
            </div>

            <div style="max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem;">

                <!-- Step 1: Idle / Start -->
                <div class="card-premium" id="step-idle">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <span style="font-size: 3rem; display: block; margin-bottom: 0.5rem;">📋</span>
                        <h2 style="margin-bottom: 0.5rem;">Scan Entry QR First</h2>
                        <p class="text-muted">Find the Entry QR code on the board and tap the button below to scan it.
                        </p>
                    </div>
                    <button class="btn-premium" id="start-btn" onclick="startCamera()">
                        📷 Start Camera & Scan
                    </button>
                </div>

                <!-- Step 2: Camera Active -->
                <div class="card-premium" id="step-camera" style="display: none;">
                    <div style="text-align: center; margin-bottom: 1rem;">
                        <h3 id="scan-label" style="color: var(--accent-mint);">SCANNING: Entry QR</h3>
                    </div>
                    <div id="reader"></div>
                    <p id="status-msg" class="text-muted"
                        style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
                        Point your camera at the Entry QR code
                    </p>
                </div>

            </div>

            <form id="result-form" action="/scan-result" method="POST" style="display: none;">
                <input type="hidden" name="session_id" id="qr-input">
            </form>
        </main>
    </div>

    <script>
        let html5QrCode = null;
        let scanning = false;

        function startCamera() {
            document.getElementById('step-idle').style.display = 'none';
            document.getElementById('step-camera').style.display = 'block';

            html5QrCode = new Html5Qrcode("reader");

            // Force back/environment camera – works on iPhone & Android
            html5QrCode.start(
                { facingMode: { exact: "environment" } },
                {
                    fps: 15,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0
                },
                onScanSuccess,
                onScanError
            ).catch(err => {
                // Fallback: try without exact constraint (some devices)
                html5QrCode.start(
                    { facingMode: "environment" },
                    { fps: 15, qrbox: { width: 250, height: 250 } },
                    onScanSuccess,
                    onScanError
                ).catch(err2 => {
                    document.getElementById('status-msg').innerHTML =
                        "⚠️ Camera access denied. Please allow camera in browser settings.";
                });
            });
        }

        function onScanSuccess(decodedText) {
            if (scanning) return;
            scanning = true;

            document.getElementById('qr-input').value = decodedText;
            document.getElementById('status-msg').innerHTML = "✅ QR captured! Processing...";
            document.getElementById('status-msg').style.color = "var(--accent-mint)";

            html5QrCode.stop().then(() => {
                document.getElementById('result-form').submit();
            }).catch(() => {
                document.getElementById('result-form').submit();
            });
        }

        function onScanError(error) {
            // Silent - just scanning frames
        }
    </script>
</body>

</html>

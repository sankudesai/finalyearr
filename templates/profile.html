<!DOCTYPE html>
<html lang="en">

<head>
    <title>Profile Settings | Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-layout">
        <nav class="sidebar">
            <a href="/" class="sidebar-icon">🏠</a>
            <a href="/teacher-dashboard" class="sidebar-icon">📊</a>
            <a href="/profile" class="sidebar-icon active">👤</a>
            <a href="/logout" class="sidebar-icon" style="margin-top: auto;">🚪</a>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="cursive-header">Profile Settings</h1>
                <a href="/teacher-dashboard" class="btn-premium"
                    style="background: rgba(255,255,255,0.05); color: white;">Back</a>
            </div>

            <div style="max-width: 600px; margin: 0 auto;">
                <div class="card-premium">
                    <div style="text-align: center; margin-bottom: 2.5rem;">
                        <div
                            style="width: 100px; height: 100px; border-radius: 50%; background: var(--accent-purple); display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 1rem; color: #000; font-weight: 700;">
                            {{ session['user'][0] | upper }}
                        </div>
                        <h2>{{ session['user'] }}</h2>
                        <p class="text-muted">{{ session['role'] | capitalize }} Account</p>
                    </div>

                    <form method="POST">
                        <label class="form-label">DISPLAY NAME</label>
                        <input type="text" name="username" class="form-input-premium" value="{{ session['user'] }}"
                            required>

                        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                            <button type="submit" class="btn-premium" style="flex: 1; justify-content: center;">Save
                                Changes</button>
                            <a href="/change-password" class="btn-premium"
                                style="flex: 1; justify-content: center; background: rgba(255,255,255,0.05); color: white;">Update
                                Password</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>

</html>

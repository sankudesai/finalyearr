<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Attendance | Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-layout">
        <nav class="sidebar">
            <a href="/" class="sidebar-icon">🏠</a>
            <a href="/student-dashboard" class="sidebar-icon active">🎓</a>
            <a href="/profile" class="sidebar-icon">👤</a>
            <a href="/notifications" class="sidebar-icon">📢</a>
            <a href="/logout" class="sidebar-icon" style="margin-top: auto;">🚪</a>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="cursive-header">My Attendance</h1>
                <a href="/student-dashboard" class="btn-premium"
                    style="background: rgba(255,255,255,0.05); color: white;">Back to Portal</a>
            </div>

            <div class="card-premium">
                {% if records %}
                <table class="table-premium">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Subject / Phase</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in records %}
                        <tr>
                            <td class="text-muted">{{ r.date }}</td>
                            <td style="font-weight: 600;">{{ r.subject }}</td>
                            <td class="{% if r.status == 'Present' %}status-mint{% else %}status-yellow{% endif %}">
                                {{ r.status }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                {% else %}
                <div style="text-align: center; padding: 5rem 0;">
                    <span style="font-size: 4rem; display: block; margin-bottom: 1rem; opacity: 0.1;">📊</span>
                    <p class="text-muted">No attendance logs found for your account.</p>
                </div>
                {% endif %}
            </div>
        </main>
    </div>

</body>

</html>

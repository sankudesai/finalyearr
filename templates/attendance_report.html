<!DOCTYPE html>
<html lang="en">

<head>
    <title>Attendance History | Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-layout">
        <nav class="sidebar">
            <a href="/" class="sidebar-icon">🏠</a>
            <a href="/teacher-dashboard" class="sidebar-icon active">📊</a>
            <a href="/profile" class="sidebar-icon">👤</a>
            <a href="/logout" class="sidebar-icon" style="margin-top: auto;">🚪</a>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <div>
                    <h1 class="cursive-header">Attendance History</h1>
                    <p class="text-muted" style="font-size: 0.9rem;">Comprehensive classroom logs</p>
                </div>
                <a href="/teacher-dashboard" class="btn-premium"
                    style="background: rgba(255,255,255,0.05); color: white;">Back to Dashboard</a>
            </div>

            <div class="card-premium">
                <table class="table-premium">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Student ID</th>
                            <th>Course</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in records %}
                        <tr>
                            <td class="text-muted">{{ r.date }}</td>
                            <td style="font-weight: 600;">{{ r.student }}</td>
                            <td class="text-muted">{{ r.subject }}</td>
                            <td class="{% if r.status == 'Present' %}status-mint{% else %}status-yellow{% endif %}">
                                {{ r.status }}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </main>
    </div>

</body>

</html>

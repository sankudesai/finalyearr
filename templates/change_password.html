<!DOCTYPE html>
<html lang="en">

<head>
    <title>Update Security | Smart Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/static/style.css" rel="stylesheet">
</head>

<body>

    <div class="dashboard-layout">
        <nav class="sidebar">
            <a href="/" class="sidebar-icon">🏠</a>
            <a href="/profile" class="sidebar-icon active">👤</a>
            <a href="/logout" class="sidebar-icon" style="margin-top: auto;">🚪</a>
        </nav>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="cursive-header">Security Update</h1>
                <a href="/profile" class="btn-premium"
                    style="background: rgba(255,255,255,0.05); color: white;">Cancel</a>
            </div>

            <div style="max-width: 500px; margin: 0 auto;">
                <div class="card-premium">
                    <div style="text-align: center; margin-bottom: 2rem;">
                        <span style="font-size: 3rem; display: block; margin-bottom: 1rem;">🔐</span>
                        <h2>Update Password</h2>
                        <p class="text-muted">Ensure your account remains secure</p>
                    </div>

                    {% if error %}
                    <div
                        style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.85rem; border: 1px solid rgba(239, 68, 68, 0.2);">
                        ⚠️ {{ error }}
                    </div>
                    {% endif %}

                    {% if success %}
                    <div
                        style="background: rgba(39, 233, 180, 0.1); color: var(--accent-mint); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.85rem; border: 1px solid rgba(39, 233, 180, 0.2);">
                        ✅ {{ success }}
                    </div>
                    {% endif %}

                    <form method="POST">
                        <label class="form-label">CURRENT PASSWORD</label>
                        <input type="password" name="old_password" class="form-input-premium" placeholder="••••••••"
                            required>

                        <label class="form-label">NEW SECURE PASSWORD</label>
                        <input type="password" name="new_password" class="form-input-premium" placeholder="••••••••"
                            required>

                        <button type="submit" class="btn-premium"
                            style="width: 100%; justify-content: center; padding: 1rem; font-size: 1rem;">
                            Update Credentials
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
